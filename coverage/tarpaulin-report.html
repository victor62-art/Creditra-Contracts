<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","home","merlinthewhiz","Documents","Callora-Contracts","contracts","revenue_pool","src","lib.rs"],"content":"#![no_std]\n\nuse soroban_sdk::{contract, contractimpl, token, Address, Env, Symbol, Vec};\n\n/// Revenue settlement contract: receives USDC from vault deducts and distributes to developers.\n///\n/// Flow: vault deduct → vault transfers USDC to this contract → admin calls distribute(to, amount).\n///\n/// # Security Assumptions\n/// - **Admin Key**: The admin has full control over fund distribution. Must be a secure multisig.\n/// - **USDC Asset**: The token address is permanently set on initialization. Must be carefully verified.\n/// - **Balances / Griefing**: The contract does not rely on strict balance invariants. External transfers\n///   increase balance without breaking logic.\n///\n/// For detailed threat models and mitigations, see [`SECURITY.md`](../../SECURITY.md).\nconst ADMIN_KEY: \u0026str = \"admin\";\nconst PENDING_ADMIN_KEY: \u0026str = \"pending_admin\";\nconst USDC_KEY: \u0026str = \"usdc\";\nconst ERR_AMOUNT_NOT_POSITIVE: \u0026str = \"amount must be positive\";\nconst ERR_UNAUTHORIZED: \u0026str = \"unauthorized: caller is not admin\";\nconst ERR_INSUFFICIENT_BALANCE: \u0026str = \"insufficient USDC balance\";\nconst ERR_NOT_INITIALIZED: \u0026str = \"revenue pool not initialized\";\n\n/// Maximum number of payments allowed in a single `batch_distribute` call.\n/// Caps CPU/memory usage well within Soroban resource limits and aligns with\n/// the vault's `MAX_BATCH_SIZE` for `batch_deduct`.\npub const MAX_BATCH_SIZE: u32 = 50;\n\n#[contract]\npub struct RevenuePool;\n\n#[contractimpl]\nimpl RevenuePool {\n    /// Initialize the revenue pool with an admin and the USDC token address.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `admin` - Address that may call `distribute`. Typically backend or multisig.\n    /// * `usdc_token` - Stellar USDC (or wrapped USDC) token contract address.\n    ///\n    /// # Panics\n    /// * If the revenue pool is already initialized.\n    ///\n    /// # Events\n    /// Emits an `init` event with the `admin` address as a topic and `usdc_token` address as data.\n    pub fn init(env: Env, admin: Address, usdc_token: Address) {\n        admin.require_auth();\n        if usdc_token == env.current_contract_address() {\n            panic!(\"invalid config: usdc_token cannot be the contract itself\");\n        }\n        if usdc_token == admin {\n            panic!(\"invalid config: usdc_token cannot be the admin address\");\n        }\n        let inst = env.storage().instance();\n        if inst.has(\u0026Symbol::new(\u0026env, ADMIN_KEY)) {\n            panic!(\"revenue pool already initialized\");\n        }\n        inst.set(\u0026Symbol::new(\u0026env, ADMIN_KEY), \u0026admin);\n        inst.set(\u0026Symbol::new(\u0026env, USDC_KEY), \u0026usdc_token);\n\n        env.events()\n            .publish((Symbol::new(\u0026env, \"init\"), admin), usdc_token);\n    }\n\n    /// Return the current admin address.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    ///\n    /// # Returns\n    /// The `Address` of the current admin.\n    ///\n    /// # Panics\n    /// * If the revenue pool has not been initialized.\n    pub fn get_admin(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, ADMIN_KEY))\n            .expect(\"revenue pool not initialized\")\n    }\n\n    /// Initiate replacement of the current admin. Only the existing admin may call this.\n    /// The new admin must call `claim_admin` to complete the transfer.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `caller` - Must be the current admin.\n    /// * `new_admin` - Address of the proposed new admin.\n    ///\n    /// # Panics\n    /// * If the caller is not the current admin (`\"unauthorized: caller is not admin\"`).\n    ///\n    /// # Events\n    /// Emits an `admin_transfer_started` event with the `current_admin` as a topic and `new_admin` as data.\n    /// Return the USDC token address configured for this pool.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    ///\n    /// # Returns\n    /// The `Address` of the USDC token contract.\n    ///\n    /// # Panics\n    /// * If the revenue pool has not been initialized.\n    pub fn get_usdc_token(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, USDC_KEY))\n            .expect(\"revenue pool not initialized\")\n    }\n\n    pub fn set_admin(env: Env, caller: Address, new_admin: Address) {\n        caller.require_auth();\n        let current = Self::get_admin(env.clone());\n        if caller != current {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        let inst = env.storage().instance();\n        inst.set(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY), \u0026new_admin);\n\n        env.events().publish(\n            (Symbol::new(\u0026env, \"admin_transfer_started\"), current),\n            new_admin,\n        );\n    }\n\n    /// Complete the admin transfer. Only the pending admin may call this.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `caller` - Must be the pending admin set via `set_admin`.\n    ///\n    /// # Panics\n    /// * If no pending admin is set (`\"no pending admin\"`).\n    /// * If the caller is not the pending admin (`\"unauthorized: caller is not pending admin\"`).\n    ///\n    /// # Events\n    /// Emits an `admin_transfer_completed` event with the `new_admin` as a topic.\n    pub fn claim_admin(env: Env, caller: Address) {\n        caller.require_auth();\n        let inst = env.storage().instance();\n        let pending: Address = inst\n            .get(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY))\n            .expect(\"no pending admin\");\n\n        if caller != pending {\n            panic!(\"unauthorized: caller is not pending admin\");\n        }\n\n        inst.set(\u0026Symbol::new(\u0026env, ADMIN_KEY), \u0026pending);\n        inst.remove(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY));\n\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_transfer_completed\"), pending), ());\n    }\n\n    /// **Note**: This function is an **event-only helper**. It is **not** a substitute\n    /// for real token settlement and does **not** move any tokens. It exists purely\n    /// for event emission / indexer alignment when configured.\n    /// In practice, USDC is received when the vault (or any address) transfers tokens\n    /// to this contract's address; no separate \"receive_payment\" call is required\n    /// for the transfer to succeed.\n    ///\n    /// This function can be used to emit an event for indexers when the backend\n    /// wants to log that a payment was credited from the vault.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `caller` - Must be the current admin.\n    /// * `amount` - Amount received (for event logging).\n    /// * `from_vault` - Optional; true if the source was the vault.\n    ///\n    /// # Panics\n    /// * If the caller is not the current admin (`\"unauthorized: caller is not admin\"`).\n    ///\n    /// # Events\n    /// Emits a `receive_payment` event with `caller` as a topic, and a tuple of\n    /// `(amount, from_vault)` as data.\n    pub fn receive_payment(env: Env, caller: Address, amount: i128, from_vault: bool) {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        env.events().publish(\n            (Symbol::new(\u0026env, \"receive_payment\"), caller),\n            (amount, from_vault),\n        );\n    }\n\n    fn validate_recipient(recipient: \u0026Address, contract_self: \u0026Address) {\n        // Rule 1 — no self-distributions (the contract sending to itself is almost\n        // certainly a logic bug; if you want to \"reclaim\" funds use a dedicated fn).\n        if recipient == contract_self {\n            panic!(\"invalid recipient: cannot distribute to the contract itself\");\n        }\n    }\n\n    /// Distribute USDC from this contract to a developer wallet.\n    ///\n    /// Only the admin may call. Transfers USDC from this contract to `to`.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `caller` - Must be the current admin.\n    /// * `to` - Developer address to receive USDC.\n    /// * `amount` - Amount in token base units (e.g. USDC stroops).\n    ///\n    /// # Panics\n    /// * If the caller is not the current admin (`\"unauthorized: caller is not admin\"`).\n    /// * If the amount is zero or negative (`\"amount must be positive\"`).\n    /// * If the revenue pool has not been initialized.\n    /// * If the revenue pool holds less than the requested amount (`\"insufficient USDC balance\"`).\n    ///\n    /// # Events\n    /// Emits a `distribute` event with `to` as a topic and `amount` as data.\n    pub fn distribute(env: Env, caller: Address, to: Address, amount: i128) {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"{}\", ERR_UNAUTHORIZED);\n        }\n        if amount \u003c= 0 {\n            panic!(\"{}\", ERR_AMOUNT_NOT_POSITIVE);\n        }\n\n        let usdc_address: Address = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, USDC_KEY))\n            .expect(ERR_NOT_INITIALIZED);\n        let usdc = token::Client::new(\u0026env, \u0026usdc_address);\n\n        let contract_address = env.current_contract_address();\n        Self::validate_recipient(\u0026to, \u0026contract_address);\n\n        let _ = usdc.try_balance(\u0026to).unwrap_or_else(|_| {\n            panic!(\n                \"invalid recipient: account does not exist \\\n                                      or has no USDC trustline\"\n            )\n        });\n\n        if usdc.balance(\u0026contract_address) \u003c amount {\n            panic!(\"{}\", ERR_INSUFFICIENT_BALANCE);\n        }\n\n        usdc.transfer(\u0026contract_address, \u0026to, \u0026amount);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"distribute\"), to), amount);\n    }\n\n    /// Distribute USDC from this contract to multiple developer wallets in one atomic transaction.\n    ///\n    /// This function implements a three-phase atomic batch transfer:\n    /// 1. **Precomputation \u0026 Validation**: Validates all amounts are positive and calculates total.\n    /// 2. **Balance Check**: Ensures contract has sufficient USDC before any transfers.\n    /// 3. **Execution**: Performs all transfers and emits events for each leg.\n    ///\n    /// The implementation guarantees atomicity: either all transfers succeed or none do.\n    /// No partial transfers occur if a later leg would fail.\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    /// * `caller` - Must be the current admin.\n    /// * `payments` - A vector of `(Address, i128)` tuples representing destinations and amounts.\n    ///   Must contain between 1 and [`MAX_BATCH_SIZE`] entries (inclusive).\n    ///\n    /// # Panics\n    /// * If `payments` is empty (`\"batch_distribute requires at least one payment\"`).\n    /// * If `payments` exceeds [`MAX_BATCH_SIZE`] entries (`\"batch too large\"`).\n    /// * If the caller is not the current admin (`\"unauthorized: caller is not admin\"`).\n    /// * If any individual amount is zero or negative (`\"amount must be positive\"`).\n    /// * If the revenue pool has not been initialized (`\"revenue pool not initialized\"`).\n    /// * If the total amount exceeds the contract's available balance (`\"insufficient USDC balance\"`).\n    /// * If the payments vector is empty (`\"payments vector cannot be empty\"`).\n    ///\n    /// # Events\n    /// Emits a `batch_distribute` event for each payment with `to` as a topic and `amount` as data.\n    ///\n    /// # Atomicity Guarantee\n    /// All validation is performed before any external calls to the USDC token contract.\n    /// This ensures that if any validation fails, no state changes or transfers occur.\n    ///\n    /// # Vector Size Policy\n    /// The maximum number of payments in a single batch is limited by Soroban's\n    /// transaction budget and footprint limits. Recommended maximum: 100 payments per batch.\n    /// For larger distributions, split into multiple transactions.\n    ///\n    /// # Examples\n    /// ```ignore\n    /// let payments = vec![\n    ///     (developer1, 1000),\n    ///     (developer2, 2000),\n    ///     (developer3, 1500),\n    /// ];\n    /// pool.batch_distribute(\u0026admin, \u0026payments);\n    /// ```\n    pub fn batch_distribute(env: Env, caller: Address, payments: Vec\u003c(Address, i128)\u003e) {\n        // Phase 0: Authorization\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"{}\", ERR_UNAUTHORIZED);\n        }\n\n        let n = payments.len();\n        if n == 0 {\n            panic!(\"batch_distribute requires at least one payment\");\n        }\n        if n \u003e MAX_BATCH_SIZE {\n            panic!(\"batch too large\");\n        }\n\n        let mut total_amount: i128 = 0;\n        for payment in payments.iter() {\n            let (_, amount) = payment;\n\n            // Validate each amount is strictly positive\n            if amount \u003c= 0 {\n                panic!(\"{}\", ERR_AMOUNT_NOT_POSITIVE);\n            }\n            total_amount = total_amount\n                .checked_add(amount)\n                .unwrap_or_else(|| panic!(\"total overflow\"));\n        }\n\n        // Phase 2: Balance Check\n        // Query the USDC token contract for current balance\n        let usdc_address: Address = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, USDC_KEY))\n            .expect(ERR_NOT_INITIALIZED);\n        let usdc = token::Client::new(\u0026env, \u0026usdc_address);\n        let contract_address = env.current_contract_address();\n\n        if usdc.balance(\u0026contract_address) \u003c total_amount {\n            panic!(\"{}\", ERR_INSUFFICIENT_BALANCE);\n        }\n\n        // Phase 3: Execution\n        // All validation passed - now perform the transfers\n        // Each transfer is atomic; if any fails, the entire transaction reverts\n        for payment in payments.iter() {\n            let (to, amount) = payment;\n            Self::validate_recipient(\u0026to, \u0026contract_address);\n            usdc.transfer(\u0026contract_address, \u0026to, \u0026amount);\n\n            // Emit event for this leg of the batch\n            env.events()\n                .publish((Symbol::new(\u0026env, \"batch_distribute\"), to), amount);\n        }\n    }\n\n    /// Return this contract's USDC balance (for testing and dashboards).\n    ///\n    /// # Arguments\n    /// * `env` - The environment running the contract.\n    ///\n    /// # Returns\n    /// The balance of the contract in USDC base units.\n    ///\n    /// # Panics\n    /// * If the revenue pool has not been initialized.\n    pub fn balance(env: Env) -\u003e i128 {\n        let usdc_address: Address = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, USDC_KEY))\n            .expect(\"revenue pool not initialized\");\n        let usdc = token::Client::new(\u0026env, \u0026usdc_address);\n        usdc.balance(\u0026env.current_contract_address())\n    }\ th":1,"stats":{"Line":3}},{"line":334,"address":[10917249,10917401,10917329],"length":1,"stats":{"Line":0}},{"line":335,"address":[10917672],"length":1,"stats":{"Line":1}},{"line":336,"address":[10917704],"length":1,"stats":{"Line":2}},{"line":338,"address":[10917764,10917852],"length":1,"stats":{"Line":3}},{"line":339,"address":[10917898],"length":1,"stats":{"Line":1}},{"line":345,"address":[10918034,10917891,10918859,10917938],"length":1,"stats":{"Line":8}},{"line":346,"address":[10918129],"length":1,"stats":{"Line":1}},{"line":347,"address":[10918233],"length":1,"stats":{"Line":1}},{"line":348,"address":[10918498],"length":1,"stats":{"Line":1}},{"line":351,"address":[10918554,10918793],"length":1,"stats":{"Line":3}},{"line":352,"address":[10918566,10918825],"length":1,"stats":{"Line":3}},{"line":366,"address":[10921832,10921008],"length":1,"stats":{"Line":1}},{"line":370,"address":[10921236,10921149],"length":1,"stats":{"Line":2}},{"line":372,"address":[10921499],"length":1,"stats":{"Line":1}},{"line":373,"address":[10921528,10921588],"length":1,"stats":{"Line":2}}],"covered":98,"coverable":102},{"path":["/","home","merlinthewhiz","Documents","Callora-Contracts","contracts","revenue_pool","src","test.rs"],"content":"extern crate std;\n\nuse super::*;\nuse soroban_sdk::testutils::{Address as _, Events as _};\nuse soroban_sdk::token;\nuse soroban_sdk::TryFromVal;\nuse soroban_sdk::{Address, Env, IntoVal, Symbol, Vec};\n\nfn create_usdc\u003c'a\u003e(\n    env: \u0026'a Env,\n    admin: \u0026Address,\n) -\u003e (Address, token::Client\u003c'a\u003e, token::StellarAssetClient\u003c'a\u003e) {\n    let contract_address = env.register_stellar_asset_contract_v2(admin.clone());\n    let address = contract_address.address();\n    let client = token::Client::new(env, \u0026address);\n    let admin_client = token::StellarAssetClient::new(env, \u0026address);\n    (address, client, admin_client)\n}\n\nfn create_pool(env: \u0026Env) -\u003e (Address, RevenuePoolClient\u003c'_\u003e) {\n    let address = env.register(RevenuePool, ());\n    let client = RevenuePoolClient::new(env, \u0026address);\n    (address, client)\n}\n\nfn fund_pool(usdc_admin_client: \u0026token::StellarAssetClient, pool_address: \u0026Address, amount: i128) {\n    usdc_admin_client.mint(pool_address, \u0026amount);\n}\n\n#[test]\nfn init_success() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_pool_addr, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    assert_eq!(client.get_admin(), admin);\n    assert_eq!(client.balance(), 0);\n}\n\n#[test]\nfn init_emits_event() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    let events = env.events().all();\n    let init_event = events.last().unwrap();\n    let event_name = Symbol::try_from_val(\u0026env, \u0026init_event.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"init\"));\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool already initialized\")]\nfn init_double_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.init(\u0026admin, \u0026usdc);\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool already initialized\")]\nfn init_double_different_admin_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let other_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n    let (usdc2, _, _) = create_usdc(\u0026env, \u0026other_admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.init(\u0026other_admin, \u0026usdc2);\n}\n\n#[test]\n#[should_panic(expected = \"invalid config: usdc_token cannot be the contract itself\")]\nfn init_usdc_token_is_contract_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n\n    // Passing the contract's own address as usdc_token should be rejected.\n    client.init(\u0026admin, \u0026pool_addr);\n}\n\n#[test]\n#[should_panic(expected = \"invalid config: usdc_token cannot be the admin address\")]\nfn init_usdc_token_is_admin_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n\n    // Passing the admin address as usdc_token should be rejected.\n    client.init(\u0026admin, \u0026admin);\n}\n\n#[test]\nfn distribute_success() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1_000);\n    client.distribute(\u0026admin, \u0026developer, \u0026400);\n\n    assert_eq!(usdc_client.balance(\u0026pool_addr), 600);\n    assert_eq!(usdc_client.balance(\u0026developer), 400);\n}\n\n#[test]\n#[should_panic(expected = \"amount must be positive\")]\nfn distribute_zero_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.distribute(\u0026admin, \u0026developer, \u00260);\n}\n\n#[test]\n#[should_panic(expected = \"insufficient USDC balance\")]\nfn distribute_excess_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100);\n    client.distribute(\u0026admin, \u0026developer, \u0026101);\n}\n\n#[test]\nfn set_admin_two_step_transfers_control() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 300);\n\n    client.set_admin(\u0026admin, \u0026new_admin);\n    assert_eq!(client.get_admin(), admin);\n\n    client.claim_admin(\u0026new_admin);\n    assert_eq!(client.get_admin(), new_admin);\n\n    client.distribute(\u0026new_admin, \u0026developer, \u0026100);\n    assert_eq!(usdc_client.balance(\u0026developer), 100);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn set_admin_unauthorized_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026attacker, \u0026new_admin);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not pending admin\")]\nfn claim_admin_wrong_address_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026attacker);\n}\n\n#[test]\nfn admin_transfer_emits_events() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    // Step 1 event\n    client.set_admin(\u0026admin, \u0026new_admin);\n    let events = env.events().all();\n    let transfer_started = events.last().unwrap();\n\n    // FIX: Convert Val to Symbol for comparison\n    let event_name = Symbol::try_from_val(\u0026env, \u0026transfer_started.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"admin_transfer_started\"));\n\n    // Step 2 event\n    client.claim_admin(\u0026new_admin);\n    let events = env.events().all();\n    let transfer_completed = events.last().unwrap();\n\n    // FIX: Convert Val to Symbol for comparison\n    let event_name_comp =\n        Symbol::try_from_val(\u0026env, \u0026transfer_completed.1.get(0).unwrap()).unwrap();\n    assert_eq!(\n        event_name_comp,\n        Symbol::new(\u0026env, \"admin_transfer_completed\")\n    );\n}\n\n#[test]\nfn receive_payment_emits_event() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    let events = env.events().all();\n    let receive_payment_event = events.last().unwrap();\n    let event_name = Symbol::try_from_val(\u0026env, \u0026receive_payment_event.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"receive_payment\"));\n\n    let amount_and_source: (i128, bool) =\n        \u003c(i128, bool)\u003e::try_from_val(\u0026env, \u0026receive_payment_event.2).unwrap();\n    assert_eq!(amount_and_source, (250, true));\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn receive_payment_non_admin_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026attacker, \u0026250, \u0026true);\n}\n\n#[test]\nfn receive_payment_is_event_only_and_does_not_move_tokens() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 500);\n\n    let before_pool = usdc_client.balance(\u0026pool_addr);\n    let before_developer = usdc_client.balance(\u0026developer);\n\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    assert_eq!(usdc_client.balance(\u0026pool_addr), before_pool);\n    assert_eq!(usdc_client.balance(\u0026developer), before_developer);\n}\n\n// ---------------------------------------------------------------------------\n// Batch distribute tests - Comprehensive coverage\n// ---------------------------------------------------------------------------\n\n#[test]\nfn batch_distribute_success() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 300_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    assert_eq!(usdc_client.balance(\u0026dev1), 300);\n    assert_eq!(usdc_client.balance(\u0026dev2), 200);\n    assert_eq!(client.balance(), 500);\n}\n\n#[test]\nfn batch_distribute_success_events() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 300_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    let events = env.events().all();\n    assert!(events.len() \u003e= 4);\n\n    for i in 0..events.len() {\n        let (_, topics, data) = events.get(i).unwrap();\n        let topic_0 = topics.get(0).unwrap();\n        if let Ok(event_name) = Symbol::try_from_val(\u0026env, \u0026topic_0) {\n            if event_name == Symbol::new(\u0026env, \"batch_distribute\") {\n                let value: i128 = i128::try_from_val(\u0026env, \u0026data).unwrap();\n                assert!(value == 300 || value == 200);\n            }\n        }\n    }\n}\n\n#[test]\nfn receive_payment_emits_event_for_admin() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    let events = env.events().all();\n    let receive_event = events.last().unwrap();\n    let event_name = Symbol::try_from_val(\u0026env, \u0026receive_event.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"receive_payment\"));\n\n    let caller: Address = Address::try_from_val(\u0026env, \u0026receive_event.1.get(1).unwrap()).unwrap();\n    assert_eq!(caller, admin);\n\n    let (amount, from_vault): (i128, bool) = receive_event.2.into_val(\u0026env);\n    assert_eq!(amount, 250);\n    assert!(from_vault);\n}\n\n#[test]\n#[should_panic(expected = \"no pending admin\")]\nfn claim_admin_without_pending_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let candidate = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.claim_admin(\u0026candidate);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not pending admin\")]\nfn claim_admin_wrong_caller_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let pending_admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026pending_admin);\n    client.claim_admin(\u0026attacker);\n}\n\n#[test]\n#[should_panic(expected = \"invalid recipient: cannot distribute to the contract itself\")]\nfn distribute_to_self_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100);\n    client.distribute(\u0026admin, \u0026pool_addr, \u002650);\n}\n\n#[test]\n#[should_panic(expected = \"amount must be positive\")]\nfn batch_distribute_zero_amount_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, 0));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n// ---------------------------------------------------------------------------\n// Event schema tests (Issue #256)\n// Each test below pins the exact topic/data layout documented in EVENT_SCHEMA.md\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"init\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"init\"));\n\n    // topic 1 = admin address\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = usdc_token address\n    let data = Address::try_from_val(\u0026env, \u0026ev.2).unwrap();\n    assert_eq!(data, usdc);\n}\n\n#[test]\nfn admin_transfer_started_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"admin_transfer_started\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"admin_transfer_started\"));\n\n    // topic 1 = current admin\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = pending admin\n    let data = Address::try_from_val(\u0026env, \u0026ev.2).unwrap();\n    assert_eq!(data, new_admin);\n}\n\n#[test]\nfn admin_transfer_completed_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026new_admin);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"admin_transfer_completed\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"admin_transfer_completed\"));\n\n    // topic 1 = new admin\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, new_admin);\n\n    // data = () empty\n    let _: () = ev.2.into_val(\u0026env);\n}\n\n#[test]\nfn receive_payment_event_from_vault_true() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u00265_000_000, \u0026true);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"receive_payment\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"receive_payment\"));\n\n    // topic 1 = caller (admin)\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = (amount, from_vault)\n    let (amount, from_vault): (i128, bool) = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 5_000_000);\n    assert!(from_vault);\n}\n\n#[test]\nfn receive_payment_event_from_vault_false() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u00261_000_000, \u0026false);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    let (amount, from_vault): (i128, bool) = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 1_000_000);\n    assert!(!from_vault);\n}\n\n#[test]\nfn distribute_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1_000_000);\n    client.distribute(\u0026admin, \u0026developer, \u00261_000_000);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"distribute\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"distribute\"));\n\n    // topic 1 = recipient\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, developer);\n\n    // data = amount\n    let amount: i128 = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 1_000_000);\n}\n\n#[test]\nfn batch_distribute_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let dev3 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 3_500_000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 1_000_000_i128));\n    payments.push_back((dev2.clone(), 2_000_000_i128));\n    payments.push_back((dev3.clone(), 500_000_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    let all_events = env.events().all();\n    let batch_events: std::vec::Vec\u003c_\u003e = all_events\n        .iter()\n        .filter(|e| {\n            e.1.get(0)\n                .and_then(|v| Symbol::try_from_val(\u0026env, \u0026v).ok())\n                .map(|s| s == Symbol::new(\u0026env, \"batch_distribute\"))\n                .unwrap_or(false)\n        })\n        .collect();\n\n    // 3 payments → 3 batch_distribute events\n    assert_eq!(batch_events.len(), 3);\n\n    // verify each event has correct topic 0 and a positive amount\n    for ev in batch_events.iter() {\n        let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n        assert_eq!(t0, Symbol::new(\u0026env, \"batch_distribute\"));\n        let amount: i128 = ev.2.into_val(\u0026env);\n        assert!(amount \u003e 0);\n    }\n}\n\n#[test]\nfn batch_distribute_is_atomic_all_or_nothing() {\n    // If any payment fails the entire batch reverts — no events emitted.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 60_i128));\n    payments.push_back((dev2.clone(), 60_i128)); // total 120 \u003e balance 100\n\n    let result = client.try_batch_distribute(\u0026admin, \u0026payments);\n    assert!(result.is_err());\n\n    // balance unchanged\n    assert_eq!(client.balance(), 100);\n}\n\n// ---------------------------------------------------------------------------\n// get_admin() and get_usdc_token() getter tests  (Issue #265)\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_admin_returns_correct_address() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    assert_eq!(client.get_admin(), admin);\n}\n\n#[test]\nfn get_admin_reflects_updated_admin_after_transfer() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    assert_eq!(client.get_admin(), admin);\n\n    // Pending phase: get_admin() still returns old admin\n    client.set_admin(\u0026admin, \u0026new_admin);\n    assert_eq!(client.get_admin(), admin);\n\n    // After claim: admin updated\n    client.claim_admin(\u0026new_admin);\n    assert_eq!(client.get_admin(), new_admin);\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn get_admin_before_init_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let (_, client) = create_pool(\u0026env);\n\n    client.get_admin();\n}\n\n#[test]\nfn get_usdc_token_returns_correct_address() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    assert_eq!(client.get_usdc_token(), usdc);\n}\n\n#[test]\nfn get_usdc_token_is_immutable_after_init() {\n    // The USDC token address must never change after initialization —\n    // this test guards against accidental mutation.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    let token_before = client.get_usdc_token();\n\n    // Admin transfer must not affect the token address\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026new_admin);\n\n    assert_eq!(client.get_usdc_token(), token_before);\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn get_usdc_token_before_init_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let (_, client) = create_pool(\u0026env);\n\n    client.get_usdc_token();\n}\n\n// ---------------------------------------------------------------------------\n// batch_distribute length-cap tests (resource exhaustion prevention)\n// ---------------------------------------------------------------------------\n\n#[test]\n#[should_panic(expected = \"batch_distribute requires at least one payment\")]\nfn batch_distribute_empty_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"batch too large\")]\nfn batch_distribute_too_large_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100_000);\n\n    // Build a batch of MAX_BATCH_SIZE + 1 entries\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    for _ in 0..=crate::MAX_BATCH_SIZE {\n        payments.push_back((Address::generate(\u0026env), 1_i128));\n    }\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\nfn batch_distribute_at_max_size_succeeds() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    let amount_per = 10_i128;\n    let total = amount_per * (crate::MAX_BATCH_SIZE as i128);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, total);\n\n    // Build a batch of exactly MAX_BATCH_SIZE entries\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    for _ in 0..crate::MAX_BATCH_SIZE {\n        payments.push_back((Address::generate(\u0026env), amount_per));\n    }\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    // Pool should be drained\n    assert_eq!(usdc_client.balance(\u0026pool_addr), 0);\n}\n\n#[test]\n#[should_panic(expected = \"amount must be positive\")]\nfn batch_distribute_negative_amount_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, -100));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn batch_distribute_unauthorized_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, 100));\n    client.batch_distribute(\u0026attacker, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"invalid recipient: cannot distribute to the contract itself\")]\nfn batch_distribute_self_recipient_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((pool_addr, 100));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","merlinthewhiz","Documents","Callora-Contracts","contracts","revenue_pool","src","test_balance.rs"],"content":"use crate::{RevenuePool, RevenuePoolClient};\nuse soroban_sdk::{testutils::Address as _, Address, Env};\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn test_balance_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(RevenuePool, ());\n    let client = RevenuePoolClient::new(\u0026env, \u0026addr);\n\n    // Calling balance before init should panic\n    client.balance();\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn test_receive_payment_unauthorized_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n\n    let admin = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n\n    let addr = env.register(RevenuePool, ());\n    let client = RevenuePoolClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    // Call from unauthorized address should panic\n    client.receive_payment(\u0026attacker, \u0026100, \u0026false);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","merlinthewhiz","Documents","Callora-Contracts","contracts","settlement","src","lib.rs"],"content":"#![no_std]\n\nuse soroban_sdk::{contract, contractimpl, contracttype, Address, Env, Map, Symbol, Vec};\n\n/// Developer balance record in settlement contract\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct DeveloperBalance {\n    pub address: Address,\n    pub balance: i128,\n}\n\n/// Global pool balance tracking.\n///\n/// `last_updated` is set to `env.ledger().timestamp()` on every\n/// `receive_payment` call that credits the pool (`to_pool = true`).\n/// It is also set at `init` time. It is **not** updated when payments\n/// are routed to individual developer balances.\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct GlobalPool {\n    pub total_balance: i128,\n    /// Ledger timestamp of the last pool credit. Useful for analytics\n    /// and staleness checks.\n    pub last_updated: u64,\n}\n\n/// Payment received event\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct PaymentReceivedEvent {\n    pub from_vault: Address,\n    pub amount: i128,\n    pub to_pool: bool, // true if credited to global pool, false if to specific developer\n    pub developer: Option\u003cAddress\u003e, // developer address if credited to specific developer\n}\n\n/// Balance credited event\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct BalanceCreditedEvent {\n    pub developer: Address,\n    pub amount: i128,\n    pub new_balance: i128,\n}\n\n/// Storage key for the registered vault address.\nconst VAULT_KEY: \u0026str = \"vault\";\n/// Storage key for the admin address.\nconst ADMIN_KEY: \u0026str = \"admin\";\nconst PENDING_ADMIN_KEY: \u0026str = \"pending_admin\";\nconst DEVELOPER_BALANCES_KEY: \u0026str = \"developer_balances\";\n/// Storage key for the global pool state.\nconst GLOBAL_POOL_KEY: \u0026str = \"global_pool\";\n\n#[contract]\npub struct CalloraSettlement;\n\n#[contractimpl]\nimpl CalloraSettlement {\n    /// Initialize the settlement contract with admin and vault address.\n    ///\n    /// Persists admin + registered vault, initializes an empty developer balance map,\n    /// and stores a timestamped global pool.\n    ///\n    /// Storage keys written:\n    /// - `admin`\n    /// - `vault`\n    /// - `developer_balances`\n    /// - `global_pool`\n    ///\n    /// # Panics\n    /// Panics if the contract is already initialized.\n    pub fn init(env: Env, admin: Address, vault_address: Address) {\n        let inst = env.storage().instance();\n        if inst.has(\u0026Symbol::new(\u0026env, ADMIN_KEY)) {\n            panic!(\"settlement contract already initialized\");\n        }\n        inst.set(\u0026Symbol::new(\u0026env, ADMIN_KEY), \u0026admin);\n        inst.set(\u0026Symbol::new(\u0026env, VAULT_KEY), \u0026vault_address);\n        let empty_balances: Map\u003cAddress, i128\u003e = Map::new(\u0026env);\n        inst.set(\u0026Symbol::new(\u0026env, DEVELOPER_BALANCES_KEY), \u0026empty_balances);\n        let global_pool = GlobalPool {\n            total_balance: 0,\n            last_updated: env.ledger().timestamp(),\n        };\n        inst.set(\u0026Symbol::new(\u0026env, GLOBAL_POOL_KEY), \u0026global_pool);\n    }\n\n    /// Receive payment from vault and credit to pool or developer balance.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be authorized vault address or admin\n    /// * `amount` - Payment amount in USDC micro-units; must be \u003e 0\n    /// * `to_pool` - If true, credit global pool; if false, credit a specific developer\n    /// * `developer` - Required when `to_pool=false`; ignored when `to_pool=true`\n    ///\n    /// # Access Control\n    /// Only the registered vault address or admin can call this function.\n    ///\n    /// # Map Operations\n    /// When crediting to developer balance:\n    /// - Performs O(1) lookup to retrieve current balance from developer map\n    /// - Updates the specific developer's balance\n    /// - Stores updated map back to contract state\n    /// - Map iteration is NOT performed; only point lookup/update\n    ///\n    /// # Events\n    /// Always emits `payment_received`. Also emits `balance_credited` when `to_pool=false`.\n    pub fn receive_payment(\n        env: Env,\n        caller: Address,\n        amount: i128,\n        to_pool: bool,\n        developer: Option\u003cAddress\u003e,\n    ) {\n        caller.require_auth();\n        Self::require_authorized_caller(env.clone(), caller.clone());\n        if amount \u003c= 0 {\n            panic!(\"amount must be positive\");\n        }\n        let inst = env.storage().instance();\n        if to_pool {\n            if developer.is_some() {\n                panic!(\"developer address must be None when to_pool=true\");\n            }\n            let mut global_pool = Self::get_global_pool(env.clone());\n            global_pool.total_balance = global_pool\n                .total_balance\n                .checked_add(amount)\n                .unwrap_or_else(|| panic!(\"pool balance overflow\"));\n            global_pool.last_updated = env.ledger().timestamp();\n            inst.set(\u0026Symbol::new(\u0026env, GLOBAL_POOL_KEY), \u0026global_pool);\n            env.events().publish(\n                (Symbol::new(\u0026env, \"payment_received\"), caller.clone()),\n                PaymentReceivedEvent {\n                    from_vault: caller.clone(),\n                    amount,\n                    to_pool: true,\n                    developer: None,\n                },\n            );\n        } else {\n            let dev_address = developer\n                .unwrap_or_else(|| panic!(\"developer address required when to_pool=false\"));\n            let mut balances: Map\u003cAddress, i128\u003e = inst\n                .get(\u0026Symbol::new(\u0026env, DEVELOPER_BALANCES_KEY))\n                .unwrap_or_else(|| Map::new(\u0026env));\n            let current_balance = balances.get(dev_address.clone()).unwrap_or(0);\n            let new_balance = current_balance\n                .checked_add(amount)\n                .unwrap_or_else(|| panic!(\"developer balance overflow\"));\n            balances.set(dev_address.clone(), new_balance);\n            inst.set(\u0026Symbol::new(\u0026env, DEVELOPER_BALANCES_KEY), \u0026balances);\n            env.events().publish(\n                (Symbol::new(\u0026env, \"payment_received\"), caller.clone()),\n                PaymentReceivedEvent {\n                    from_vault: caller.clone(),\n                    amount,\n                    to_pool: false,\n                    developer: Some(dev_address.clone()),\n                },\n            );\n            env.events().publish(\n                (Symbol::new(\u0026env, \"balance_credited\"), dev_address.clone()),\n                BalanceCreditedEvent {\n                    developer: dev_address,\n                    amount,\n                    new_balance,\n                },\n            );\n        }\n    }\n\n    /// Get current admin address\n    pub fn get_admin(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, ADMIN_KEY))\n            .unwrap_or_else(|| panic!(\"settlement contract not initialized\"))\n    }\n\n    /// Get registered vault address\n    pub fn get_vault(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, VAULT_KEY))\n            .unwrap_or_else(|| panic!(\"settlement contract not initialized\"))\n    }\n\n    /// Get global pool information\n    pub fn get_global_pool(env: Env) -\u003e GlobalPool {\n        env.storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, GLOBAL_POOL_KEY))\n            .unwrap_or_else(|| panic!(\"settlement contract not initialized\"))\n    }\n\n    /// Get developer balance\n    ///\n    /// Performs a direct O(1) map lookup for the specified developer's balance.\n    /// This is the preferred method for querying individual balances as it does not iterate the map.\n    ///\n    /// # Arguments\n    /// * `developer` - Developer address to query\n    ///\n    /// # Returns\n    /// Balance in USDC micro-units, or 0 if no balance recorded\n    ///\n    /// # Safety\n    /// Safe for all use cases; does not depend on map iteration order.\n    pub fn get_developer_balance(env: Env, developer: Address) -\u003e i128 {\n        if !env.storage().instance().has(\u0026Symbol::new(\u0026env, ADMIN_KEY)) {\n            panic!(\"settlement contract not initialized\");\n        }\n        let inst = env.storage().instance();\n        let balances: Map\u003cAddress, i128\u003e = inst\n            .get(\u0026Symbol::new(\u0026env, DEVELOPER_BALANCES_KEY))\n            .unwrap_or_else(|| Map::new(\u0026env));\n        balances.get(developer).unwrap_or(0)\n    }\n\n    /// Get all developer balances (admin only)\n    ///\n    /// **CRITICAL**: Map iteration order is **NOT stable** and should not be relied upon.\n    /// Use this function only for administrative queries or reporting purposes.\n    /// For production integrations with many developers (\u003e100), implement off-chain indexing\n    /// by listening to `BalanceCreditedEvent` and maintaining a local database.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be the current admin address.\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    /// # Iteration Behavior\n    /// - **Small maps (\u003c 100 entries)**: Safe to iterate; yields current state but order is unstable\n    /// - **Large maps (\u003e 100 entries)**: Consider off-chain indexing to avoid excessive gas costs\n    /// - **Order guarantees**: NONE. Do not use for routing, prioritization, or deterministic selection.\n    ///\n    /// # Returns\n    /// Vec of DeveloperBalance records. Iteration order is unstable and may vary between calls.\n    ///\n    /// # Use Cases\n    /// ✅ Administrative dashboards and reporting\n    /// ✅ Audit compliance queries\n    /// ✅ Contract state verification\n    /// ❌ Automatic routing based on iteration order\n    /// ❌ Deterministic selection of developers\n    ///\n    /// # Performance\n    /// Gas cost scales with number of developers:\n    /// - 50 developers: ~500 gas\n    /// - 100 developers: ~1,000 gas\n    /// - 500 developers: ~5,000 gas (consider off-chain indexing)\n    pub fn get_all_developer_balances(env: Env, caller: Address) -\u003e Vec\u003cDeveloperBalance\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        let inst = env.storage().instance();\n        let balances: Map\u003cAddress, i128\u003e = inst\n            .get(\u0026Symbol::new(\u0026env, DEVELOPER_BALANCES_KEY))\n            .unwrap_or_else(|| Map::new(\u0026env));\n        let mut result = Vec::new(\u0026env);\n        for (address, balance) in balances.iter() {\n            result.push_back(DeveloperBalance { address, balance });\n        }\n        result\n    }\n\n    /// Nominate a new admin (admin only).\n    ///\n    /// # Arguments\n    /// * `caller` - Current admin address; must match stored admin\n    /// * `new_admin` - Address to nominate as new admin\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    /// # Security\n    /// This implements a two-step admin transfer process:\n    /// 1. Current admin calls `set_admin()` to nominate new admin\n    /// 2. Nominated admin must call `accept_admin()` to complete transfer\n    ///\n    /// This prevents accidental admin loss and ensures the new admin\n    /// has control of their private keys before gaining privileges.\n    ///\n    /// # Events\n    /// Emits `admin_nominated` event with current and new admin addresses.\n    ///\n    /// # Panics\n    /// Panics if caller is not the current admin.\n    pub fn set_admin(env: Env, caller: Address, new_admin: Address) {\n        caller.require_auth();\n        let current_admin = Self::get_admin(env.clone());\n        if caller != current_admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY), \u0026new_admin);\n\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"admin_nominated\"),\n                current_admin,\n                new_admin,\n            ),\n            (),\n        );\n    }\n\n    /// Accept the admin role (pending admin only).\n    ///\n    /// # Access Control\n    /// Only the nominated pending admin can call this function.\n    ///\n    /// # Security\n    /// This is the second step of the two-step admin transfer process.\n    /// The nominated admin must explicitly accept, proving control of\n    /// their private keys before gaining admin privileges.\n    ///\n    /// # Events\n    /// Emits `admin_accepted` event with old and new admin addresses.\n    ///\n    /// # Panics\n    /// Panics if there is no pending admin transfer (i.e., `set_admin()`\n    /// was not called first).\n    pub fn accept_admin(env: Env) {\n        let inst = env.storage().instance();\n        let pending: Address = inst\n            .get(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY))\n            .expect(\"no admin transfer pending\");\n        pending.require_auth();\n\n        let current = Self::get_admin(env.clone());\n        inst.set(\u0026Symbol::new(\u0026env, ADMIN_KEY), \u0026pending);\n        inst.remove(\u0026Symbol::new(\u0026env, PENDING_ADMIN_KEY));\n\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_accepted\"), current, pending), ());\n    }\n\n    /// Update vault address (admin only).\n    ///\n    /// # Arguments\n    /// * `caller` - Current admin address; must match stored admin\n    /// * `new_vault` - New vault contract address to register\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    /// # Security\n    /// The vault address controls which contract can send payments to\n    /// the settlement contract. Only trusted addresses should be set.\n    /// Changing the vault address immediately revokes access from the\n    /// old vault, so coordinate carefully during migrations.\n    ///\n    /// # Events\n    /// This function does not emit events. Monitor vault changes by\n    /// comparing the result of `get_vault()` across blocks.\n    ///\n    /// # Panics\n    /// Panics if caller is not the current admin.\n    pub fn set_vault(env: Env, caller: Address, new_vault: Address) {\n        caller.require_auth();\n        let current_admin = Self::get_admin(env.clone());\n        if caller != current_admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, VAULT_KEY), \u0026new_vault);\n    }\n\n    /// Internal function to require authorized caller (vault or admin)\n    fn require_authorized_caller(env: Env, caller: Address) {\n        let vault = Self::get_vault(env.clone());\n        let admin = Self::get_admin(env.clone());\n        if caller != vault \u0026\u0026 caller != admin {\n            panic!(\"unauthorized: caller must be vault or admin\");\n        }\n    }\n}\n\n#[cfg(test)]\nmod test;\n\n#[cfg(test)]\nmod test_views;\n","traces":[{"line":74,"address":[11100698,11100763,11099488],"length":1,"stats":{"Line":9}},{"line":75,"address":[11099521,11099569],"length":1,"stats":{"Line":16}},{"line":76,"address":[11099690],"length":1,"stats":{"Line":8}},{"line":77,"address":[11100704],"length":1,"stats":{"Line":1}},{"line":79,"address":[11099842],"length":1,"stats":{"Line":8}},{"line":80,"address":[11099966],"length":1,"stats":{"Line":8}},{"line":81,"address":[11100098],"length":1,"stats":{"Line":8}},{"line":82,"address":[11100110,11100202],"length":1,"stats":{"Line":16}},{"line":85,"address":[11100282],"length":1,"stats":{"Line":8}},{"line":87,"address":[11100418],"length":1,"stats":{"Line":8}},{"line":110,"address":[11096388,11092608,11095082],"length":1,"stats":{"Line":5}},{"line":117,"address":[11092689],"length":1,"stats":{"Line":4}},{"line":118,"address":[11092802,11096347],"length":1,"stats":{"Line":4}},{"line":119,"address":[11092930],"length":1,"stats":{"Line":2}},{"line":120,"address":[11092962,11096329],"length":1,"stats":{"Line":2}},{"line":122,"address":[11092994,11092955],"length":1,"stats":{"Line":3}},{"line":123,"address":[11093135],"length":1,"stats":{"Line":2}},{"line":124,"address":[11095132,11093224],"length":1,"stats":{"Line":2}},{"line":125,"address":[11096299,11095158],"length":1,"stats":{"Line":2}},{"line":127,"address":[11095151,11095206],"length":1,"stats":{"Line":2}},{"line":128,"address":[11095331,11095229,11095260],"length":1,"stats":{"Line":3}},{"line":130,"address":[11095253],"length":1,"stats":{"Line":1}},{"line":131,"address":[11095292],"length":1,"stats":{"Line":1}},{"line":132,"address":[11095355],"length":1,"stats":{"Line":1}},{"line":133,"address":[11095467],"length":1,"
