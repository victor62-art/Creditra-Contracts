 at the cap — all must pass\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 50,\n            request_id: None\n        },\n        DeductItem {\n            amount: 50,\n            request_id: None\n        },\n        DeductItem {\n            amount: 50,\n            request_id: None\n        },\n    ];\n    let balance = client.batch_deduct(\u0026owner, \u0026items);\n    assert_eq!(balance, 150);\n}\n\n#[test]\n#[should_panic(expected = \"deduct amount exceeds max_deduct\")]\nfn batch_deduct_one_item_above_max_deduct_panics() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 0);\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026Some(50));\n    usdc_admin.mint(\u0026owner, \u0026300);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026300, \u00261000);\n    client.deposit(\u0026owner, \u0026300);\n    // second item exceeds cap — must panic\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 50,\n            request_id: None\n        },\n        DeductItem {\n            amount: 51,\n            request_id: None\n        },\n    ];\n    client.batch_deduct(\u0026owner, \u0026items);\n}\n\n// ---------------------------------------------------------------------------\n// get_contract_addresses tests  (Issue #257)\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_contract_addresses_returns_usdc_only_after_init() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let (got_usdc, got_settlement, got_pool) = client.get_contract_addresses();\n    assert_eq!(got_usdc, Some(usdc));\n    assert_eq!(got_settlement, None);\n    assert_eq!(got_pool, None);\n}\n\n#[test]\nfn get_contract_addresses_reflects_set_settlement() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let settlement = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let (got_usdc, got_settlement, got_pool) = client.get_contract_addresses();\n    assert_eq!(got_usdc, Some(usdc));\n    assert_eq!(got_settlement, Some(settlement));\n    assert_eq!(got_pool, None);\n}\n\n#[test]\nfn get_contract_addresses_reflects_set_revenue_pool() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let pool = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026Some(pool.clone()),\n        \u0026None,\n    );\n\n    let (got_usdc, got_settlement, got_pool) = client.get_contract_addresses();\n    assert_eq!(got_usdc, Some(usdc));\n    assert_eq!(got_settlement, None);\n    assert_eq!(got_pool, Some(pool));\n}\n\n#[test]\nfn get_contract_addresses_reflects_all_three_configured() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let settlement = Address::generate(\u0026env);\n    let pool = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026Some(pool.clone()),\n        \u0026None,\n    );\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let (got_usdc, got_settlement, got_pool) = client.get_contract_addresses();\n    assert_eq!(got_usdc, Some(usdc));\n    assert_eq!(got_settlement, Some(settlement));\n    assert_eq!(got_pool, Some(pool));\n}\n\n#[test]\nfn get_contract_addresses_updates_after_clear_revenue_pool() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let pool = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026Some(pool), \u0026None);\n    client.set_revenue_pool(\u0026owner, \u0026None); // clear it\n\n    let (_, _, got_pool) = client.get_contract_addresses();\n    assert_eq!(got_pool, None);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","merlinthewhiz","Documents","Callora-Contracts","contracts","vault","src","test_init_hardening.rs"],"content":"use crate::{CalloraVault, CalloraVaultClient};\nuse soroban_sdk::{testutils::Address as _, Address, Env};\n\n#[test]\n#[should_panic(expected = \"vault already initialized\")]\nfn test_double_initialization_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    // First init\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026None);\n    // Second init should panic\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026None);\n}\n\n#[test]\n#[should_panic(expected = \"usdc_token cannot be vault address\")]\nfn test_init_usdc_self_address_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    // Passing vault's own address as USDC token\n    client.init(\u0026owner, \u0026addr, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026None);\n}\n\n#[test]\n#[should_panic(expected = \"revenue_pool cannot be vault address\")]\nfn test_init_revenue_pool_self_address_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    // Passing vault's own address as Revenue Pool\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026Some(0),\n        \u0026None,\n        \u0026None,\n        \u0026Some(addr.clone()),\n        \u0026None,\n    );\n}\n\n#[test]\n#[should_panic(expected = \"min_deposit must be positive\")]\nfn test_init_negative_min_deposit_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026Some(-10), \u0026None, \u0026None);\n}\n\n#[test]\n#[should_panic(expected = \"min_deposit must be positive\")]\nfn test_init_zero_min_deposit_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026Some(0), \u0026None, \u0026None);\n}\n\n#[test]\n#[should_panic(expected = \"max_deduct must be positive\")]\nfn test_init_zero_max_deduct_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026Some(0));\n}\n\n#[test]\n#[should_panic(expected = \"max_deduct must be positive\")]\nfn test_init_negative_max_deduct_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026Some(-50));\n}\n\n#[test]\n#[should_panic(expected = \"min_deposit cannot exceed max_deduct\")]\nfn test_init_min_deposit_exceeds_max_deduct_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026Some(100), \u0026None, \u0026Some(50));\n}\n\n#[test]\nfn test_init_validates_successfully() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    let pool = Address::generate(\u0026env);\n    env.mock_all_auths();\n\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026addr);\n\n    // Test valid initialization with valid parameters\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026Some(0),\n        \u0026None,\n        \u0026Some(10),\n        \u0026Some(pool.clone()),\n        \u0026Some(50),\n    );\n\n    assert_eq!(client.get_admin(), owner);\n}\n","traces":[],"covered":0,"coverable":0}]};

    <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
</body>
</html>
